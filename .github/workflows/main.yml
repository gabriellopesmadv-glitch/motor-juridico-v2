name: Legal Bot V2

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python scraper.py
